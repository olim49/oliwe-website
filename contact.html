<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Oliwe</title>

    <!-- AOS animations -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo-container">
        <img src="assets/img/logo.png" alt="Logo Oliwe" class="logo">
        <span class="logo-text">Oliwe</span>
    </div>

    <nav>
        <a href="index.html">Accueil</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </nav>

    <button id="themeToggle">Mode</button>
</header>


<!-- INTRO -->
<section class="contact-intro" data-aos="fade-up">
    <h2 class="section-title">Discutons de ton <span style="color:#3b82f6;">projet</span></h2>
    <p class="section-subtitle">
        Une question, une demande de devis ou simplement envie d’échanger ?
        Je te réponds rapidement.
    </p>
</section>


<!-- FORMULAIRE AVEC ENVOI EMAIL -->
<section class="contact-form-section" data-aos="fade-up">

    <form class="contact-form" action="https://formsubmit.co/contact@oliwe.fr" method="POST">

        <!-- PARAMÈTRES FORM SUBMIT -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_subject" value="Nouveau message depuis Oliwe.fr">
        <input type="hidden" name="_next" value="https://oliwe.fr/merci.html">

        <div class="form-group">
            <label for="prenom">Prenom</label>
            <input type="text" name="name" id="prenom" placeholder="Ton prenom" required>
        </div>
        <div class="form-group">
            <label for="name">Nom</label>
            <input type="text" name="name" id="name" placeholder="Ton nom" required>
        </div>

        <div class="form-group">
            <label for="email">Adresse email</label>
            <input type="email" name="email" id="email" placeholder="ton@email.com" required>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea name="message" id="message" rows="5" placeholder="Décris ton projet..." required></textarea>
        </div>

        <button type="submit" class="btn">Envoyer</button>

    </form>

</section>


<!-- CTA FINAL -->
<section class="cta-final" data-aos="fade-up">
    <h2>Besoin d’un site ou d’un design rapidement ?</h2>
    <a href="services.html" class="btn">Voir mes services</a>
</section>


<!-- FOOTER -->
<footer>
    <p>© 2026 Oliwe — Création de sites web & design visuel</p>
</footer>


<!-- SCRIPTS -->
<script src="script.js"></script>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>

</body>
</html>
